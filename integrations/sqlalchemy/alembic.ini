# Alembic configuration — two environments: postgres and mysql

[alembic]
# path to migration scripts (overridden per-env via --name)
script_location = alembic

[alembic:postgres]
script_location = alembic
sqlalchemy.url = postgresql://localhost/dbhelper_fixtures

[alembic:mysql]
script_location = alembic
sqlalchemy.url = mysql://localhost/dbhelper_fixtures

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
